# Add blank lines between items (functions, structs, etc.)
blank_lines_lower_bound = 3
blank_lines_upper_bound = 5

# Prevent any line breaking by setting very high width
max_width = 500
use_small_heuristics = "Max"

# Disable all formatting that could break lines
format_code_in_doc_comments = false
format_macro_bodies = false
format_macro_matchers = false
format_strings = false
wrap_comments = false

# Preserve existing code structure
reorder_imports = false
reorder_modules = false
reorder_impl_items = false

# Error handling
error_on_line_overflow = false
error_on_unformatted = false
