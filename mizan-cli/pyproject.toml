[tool.poetry]
name = "mizan-cli"
version = "0.1.0"
description = "CLI tool for interacting with RustMizan dataset"
authors = ["Tarek Elsayed"]
readme = "README.md"
packages = [{ include = "mizan_cli", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
click = "^8.2.1"
rich = "^14.0.0"
pydantic = "^2.11.7"
langsmith = ">=0.4.6"
openai = ">=1.0.0"
anthropic = ">=0.40.0"
scikit-learn = "^1.3.0"

[tool.poetry.scripts]
mizan = "mizan_cli.cli:main"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
black = "^24.0.0"
ruff = "^0.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short", "--strict-markers"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
