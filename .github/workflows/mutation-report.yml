name: Mutation Analysis and Dataset Generation

on:
  workflow_dispatch:

jobs:
  mutation-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.1
          components: rustfmt, clippy

      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Build mizan-mut
        run: |
          cargo +nightly build --release -p mizan-mut
          echo "$GITHUB_WORKSPACE/target/release" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mizan-cli
        run: |
          cd mizan-cli
          pip install -e .

      - name: Run mutation analysis and dataset generation
        run: |
          ./.github/scripts/mutation-report.sh
        env:
          RUST_BACKTRACE: 1

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-analysis-report
          path: mutation-summary.md

      - name: Upload generated datasets
        uses: actions/upload-artifact@v4
        with:
          name: mizan-datasets
          path: datasets/
          if-no-files-found: warn

      - name: Display summary
        run: |
          echo "## Mutation Analysis and Dataset Generation Summary"
          echo
          cat mutation-summary.md
          echo
          echo "## Generated Datasets"
          if [ -d "datasets" ]; then
            echo "Datasets generated in datasets/ directory:"
            ls -la datasets/
          else
            echo "No datasets directory found"
          fi
