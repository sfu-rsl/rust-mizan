name: Mutation Report

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  mutation-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.1
          components: rustfmt, clippy

      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Build mizan-mut
        run: |
          cargo +nightly build --release -p mizan-mut
          echo "$GITHUB_WORKSPACE/target/release" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mizan-cli
        run: |
          cd mizan-cli
          pip install -e .

      - name: Run mutation report
        run: |
          ./.github/scripts/mutation-report.sh
        env:
          RUST_BACKTRACE: 1

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: mutation-summary.md

      - name: Display summary
        run: |
          echo "## Mutation Report Summary"
          echo
          cat mutation-summary.md
