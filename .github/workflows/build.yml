name: Cargo Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust 1.84.1
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.84.1"
          override: true

      - name: Validate Rust version
        run: rustc --version
        shell: bash

      - name: Build the Rust workspace
        run: cargo build --workspace

      - name: Mutuation - Unconventional Formatting
        run: cargo build --workspace
        working-directory: variants/fmt-unconventional
